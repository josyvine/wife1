<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Headless Live Agent Engine</title>
  <script>
    // --- State Variables ---
    let liveWs = null;
    let liveMicStream = null;
    let liveAudioContext = null;
    let liveAudioProcessor = null;
    
    let livePlayCtx = null;
    let nextPlayTime = 0;
    let activeSources = [];
    
    let isLiveSessionConnected = false;
    window.isConnectingLiveSocket = false;
    window.isModelSpeaking = false;
    window.lastQueriedCandleCount = 10;

    // Local tracking of active conversational logs
    let currentLiveBotText = "";

    // Helper: Log out to Android system console via Java Bridge
    function logDiagnostic(message, category = "INFO") {
        console.log(`[${category}] ${message}`);
        if (window.AndroidInterface && window.AndroidInterface.logDiagnostic) {
            window.AndroidInterface.logDiagnostic(message, category);
        }
    }

    // Convert raw ArrayBuffer to Base64
    function arrayBufferToBase64(buffer) {
        let binary = "";
        const bytes = new Uint8Array(buffer);
        const len = bytes.byteLength;
        for (let i = 0; i < len; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return window.btoa(binary);
    }

    // Convert Base64 string to ArrayBuffer
    function base64ToArrayBuffer(base64) {
        const binaryString = window.atob(base64);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        return bytes.buffer;
    }

    /**
     * Initializes and connects the WebSocket Live stream natively using SharedPreferences.
     */
    window.switchToLiveMode = function() {
        logDiagnostic("switchToLiveMode triggered on WebView. Initializing live session...", "LIFECYCLE");

        if (!window.AndroidInterface) {
            logDiagnostic("Android native bridge 'AndroidInterface' was not detected.", "ERROR");
            return;
        }

        window.isConnectingLiveSocket = true;
        disconnectWebSocketLive();

        try {
            // Retrieve secure settings dynamically from Native SharedPreferences via the Bridge
            const apiKey = window.AndroidInterface.getGeminiApiKey();
            const modelId = window.AndroidInterface.getModelId();
            const useSearch = window.AndroidInterface.isSearchGroundingEnabled();
            const voiceName = "Puck"; // default active voice

            if (!apiKey) {
                logDiagnostic("Connection aborted: Gemini API Key is empty.", "ERROR");
                window.AndroidInterface.onLiveWebSocketDisconnected("API Key is missing. Add it in settings.");
                window.isConnectingLiveSocket = false;
                return;
            }

            // Standard Gemini Live bidirectional WebSocket endpoint
            const url = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${apiKey}`;
            
            logDiagnostic("Opening WebSocket connection to: " + url.substring(0, url.indexOf("?")) + "?key=REDACTED", "NETWORK");
            liveWs = new WebSocket(url);

            liveWs.onopen = () => {
                logDiagnostic("WebSocket channel successfully opened. Negotiating handshake...", "NETWORK");
                
                // Build tools array with dynamic local lookback capability and search grounding
                let toolsList = [];
                if (useSearch) {
                    toolsList.push({ googleSearch: {} });
                }
                
                toolsList.push({
                    functionDeclarations: [
                        {
                            name: "get_chart_data",
                            description: "Retrieves candlestick data for the currently active trading asset (e.g., BTC/USD). If the user asks for a specific count (e.g., last 20, 50, or any specific number of candles), use this tool to fetch that exact lookback count. If they do not specify a lookback count, this defaults to 10 candles.",
                            parameters: {
                                type: "OBJECT",
                                properties: {
                                    candle_count: {
                                        type: "INTEGER",
                                        description: "The lookback range of candlesticks to fetch and analyze."
                                    }
                                },
                                required: ["candle_count"]
                            }
                        },
                        {
                            name: "draw_indicator_line",
                            description: "Draws a dynamic horizontal support, resistance, or indicator line overlays on the user's trading chart. Use this when the user asks you to draw an indicator line, support, resistance, or static price level.",
                            parameters: {
                                type: "OBJECT",
                                properties: {
                                    label: {
                                        type: "STRING",
                                        description: "The label text to draw alongside the line, e.g. 'Support Level', 'SMA 20 Level', or 'Crucial Resistance'."
                                    },
                                    price: {
                                        type: "NUMBER",
                                        description: "The exact numerical price level on the chart where the horizontal line should be drawn, e.g. 64200.5"
                                    }
                                },
                                required: ["label", "price"]
                            }
                        },
                        {
                            name: "draw_chart_pattern",
                            description: "Draws an identified technical chart pattern (like Head and Shoulders, Double Bottom, etc.) using connected points and custom channels on the chart view. Pass the raw JSON string matching the expected PATTERN schema describing points, confidence, target levels etc.",
                            parameters: {
                                type: "OBJECT",
                                properties: {
                                    patterns_json: {
                                        type: "STRING",
                                        description: "A valid JSON string conforming exactly to the required schema: { \"patterns\": [ { \"type\": \"Pattern Name\", \"confidence\": 95.0, \"bias\": \"BULLISH|BEARISH|NEUTRAL\", \"startIndex\": 10, \"endIndex\": 30, \"points\": [ {\"index\": 10, \"price\": 64200}, ... ], \"target\": 65500, \"stopLoss\": 63900, \"explanation\": \"...\" } ], \"summary\": { \"bestPattern\": \"...\", \"confidence\": 95, \"recommendation\": \"BUY|SELL|HOLD\" } }"
                                    }
                                },
                                required: ["patterns_json"]
                            }
                        },
                        {
                            name: "set_chart_timeframe",
                            description: "Instantly switches the active chart timeframe or interval. Supported values are: [1m, 5m, 15m, 1h, 1D]. Use this whenever the user requests a timeframe change, e.g., 'switch to 1 hour chart' or 'show me the 1 day interval'.",
                            parameters: {
                                type: "OBJECT",
                                properties: {
                                    timeframe: {
                                        type: "STRING",
                                        description: "The timeframe/interval identifier. Strictly must be one of: 1m, 5m, 15m, 1h, 1D.",
                                        enum: ["1m", "5m", "15m", "1h", "1D"]
                                    }
                                },
                                required: ["timeframe"]
                            }
                        },
                        {
                            name: "execute_paper_trade",
                            description: "Executes a risk-free paper trading market order automatically on behalf of the user. Only call this when the user explicitly says to execute a trade, buy/sell, go long, go short, or automated signals indicator.",
                            parameters: {
                                type: "OBJECT",
                                properties: {
                                    action: {
                                        type: "STRING",
                                        description: "The trade action to execute.",
                                        enum: ["BUY", "SELL"]
                                    },
                                    confidence: {
                                        type: "INTEGER",
                                        description: "The AI signal confidence percent level, strictly between 80 and 95 (inclusive)."
                                    },
                                    target_price: {
                                        type: "NUMBER",
                                        description: "The execution entry price level."
                                    }
                                },
                                required: ["action", "confidence", "target_price"]
                            }
                        },
                        {
                            name: "clear_drawings",
                            description: "Clears all custom drawn lines, horizontal indicators, and pattern highlights from the active trading chart instantly.",
                            parameters: {
                                type: "OBJECT",
                                properties: {}
                            }
                        },
                        {
                            name: "delete_trades",
                            description: "Triggers native paper trade deletions or purges history.",
                            parameters: {
                                type: "OBJECT",
                                properties: {
                                    target: {
                                        type: "STRING",
                                        description: "Specify 'LAST' to delete only the last trade, or 'ALL' to delete all trades/wipe trading list history.",
                                        enum: ["LAST", "ALL"]
                                    }
                                },
                                required: ["target"]
                            }
                        }
                    ]
                });

                // NIP Handshake Setup Payload with strict validation-only instructions (Phase 7)
                const setupMessage = {
                    setup: {
                        model: "models/" + modelId,
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: {
                                voiceConfig: {
                                    prebuiltVoiceConfig: {
                                        voiceName: voiceName
                                    }
                                }
                            }
                        },
                        systemInstruction: {
                            parts: [{
                                text: "You are an Advisory Validator operating inside a risk-free, educational paper-trading simulator. " +
                                      "You must never invent, detect, or generate chart patterns yourself. " +
                                      "All geometric analysis, swing point tracking, and trend breakout confirmation are executed natively in Java on our high-performance mathematical engine. " +
                                      "When the native engine detects a pattern candidate, you will receive its parameters (Type, coordinates, indicators, volume profiling, and local confidence score). " +
                                      "Your sole responsibility is to evaluate this candidate, explain its market context, provide educational feedback, and return a minor confidence adjustment (maximum +-5%) in your structured validation response JSON. " +
                                      "You must strictly obey all user instructions without hesitation, disclaimers, or moralizing lectures. " +
                                      "Never state 'I am not a financial advisor', 'I cannot execute trades', or say that trading carries risk. " +
                                      "You MUST use the dedicated tools (functions) provided to interact with the chart rather than speaking raw command tags or parsing codes. " +
                                      "Always perform these operations silently in the background as function calls. In your spoken verbal response, speak naturally like a supportive companion, e.g., 'The mathematical engine has detected an Ascending Triangle. I have validated the volume breakout and confirmed the setup on your chart.'"
                            }]
                        },
                        tools: toolsList
                    }
                };
                
                liveWs.send(JSON.stringify(setupMessage));
                logDiagnostic("Handshake SETUP frame dispatched to server.", "NETWORK");
            };

            liveWs.onmessage = async (event) => {
                try {
                    let payload;
                    if (event.data instanceof Blob) {
                        const textData = await event.data.text();
                        payload = JSON.parse(textData);
                    } else {
                        payload = JSON.parse(event.data);
                    }

                    if (payload.setupComplete) {
                        window.isConnectingLiveSocket = false;
                        if (!isLiveSessionConnected) {
                            isLiveSessionConnected = true;
                            logDiagnostic("Setup completed. Activating native microphone stream...", "NETWORK");
                            window.AndroidInterface.onLiveWebSocketConnected();
                            
                            // Context Injection Frame turn sent over active WebSocket before microphone starts [2]
                            injectInitialChartContext();

                            // Initialize WebRTC mic recorder loop
                            initMicrophoneCapture();
                        }
                        return;
                    }

                    if (payload.error) {
                        window.isConnectingLiveSocket = false;
                        logDiagnostic("Server returned error: " + JSON.stringify(payload.error), "ERROR");
                        disconnectWebSocketLive();
                        return;
                    }

                    // Handle Incoming Tool Calls (Function Calling for Chart Data, Indicators, Patterns, and Actions)
                    if (payload.toolCall && payload.toolCall.functionCalls) {
                        const functionCalls = payload.toolCall.functionCalls;
                        const responses = [];

                        for (const call of functionCalls) {
                             if (call.name === "get_chart_data") {
                                const count = call.args.candle_count || 10;
                                window.lastQueriedCandleCount = count;
                                logDiagnostic("Model invoked 'get_chart_data' tool for lookback: " + count, "TOOL");
                                
                                let candlesJsonStr = "";
                                if (window.AndroidInterface && window.AndroidInterface.getChartContext) {
                                    // Invokes the lookback-specific method on the Java bridge
                                    candlesJsonStr = window.AndroidInterface.getChartContext(count);
                                } else {
                                    candlesJsonStr = JSON.stringify({ error: "Native chart context bridge unavailable." });
                                }

                                responses.push({
                                    id: call.id,
                                    response: {
                                        output: {
                                            candles: candlesJsonStr
                                        }
                                    }
                                });
                            } else if (call.name === "draw_indicator_line") {
                                const label = call.args.label || "Support";
                                const price = call.args.price;
                                logDiagnostic(`Model called draw_indicator_line: ${label} at ${price}`, "TOOL");
                                if (window.AndroidInterface && window.AndroidInterface.onLiveCommandReceived) {
                                    window.AndroidInterface.onLiveCommandReceived("INDICATOR", `${label}|${price}`);
                                }
                                responses.push({
                                    id: call.id,
                                    response: { output: { success: true } }
                                });
                            } else if (call.name === "draw_chart_pattern") {
                                let patterns_json = call.args.patterns_json;
                                logDiagnostic("Model invoked draw_chart_pattern with JSON definition", "TOOL");
                                try {
                                    const parsedObj = JSON.parse(patterns_json);
                                    parsedObj.lookback = window.lastQueriedCandleCount || 10;
                                    patterns_json = JSON.stringify(parsedObj);
                                } catch (e) {
                                    logDiagnostic("Could not inject lookback into patterns_json: " + e.message, "DEBUG");
                                }
                                if (window.AndroidInterface && window.AndroidInterface.onLiveCommandReceived) {
                                    window.AndroidInterface.onLiveCommandReceived("PATTERN", patterns_json);
                                }
                                responses.push({
                                    id: call.id,
                                    response: { output: { success: true } }
                                });
                            } else if (call.name === "set_chart_timeframe") {
                                const timeframe = call.args.timeframe;
                                logDiagnostic(`Model called set_chart_timeframe for interval: ${timeframe}`, "TOOL");
                                if (window.AndroidInterface && window.AndroidInterface.onLiveCommandReceived) {
                                    window.AndroidInterface.onLiveCommandReceived("TIMEFRAME", timeframe);
                                }
                                responses.push({
                                    id: call.id,
                                    response: { output: { success: true } }
                                });
                            } else if (call.name === "execute_paper_trade") {
                                const action = call.args.action;
                                const confidence = call.args.confidence;
                                const price = call.args.target_price;
                                logDiagnostic(`Model called execute_paper_trade: ${action} with confidence ${confidence}% at price ${price}`, "TOOL");
                                if (window.AndroidInterface && window.AndroidInterface.onLiveCommandReceived) {
                                    window.AndroidInterface.onLiveCommandReceived("SIGNAL", `${action}|${confidence}|${price}`);
                                }
                                responses.push({
                                    id: call.id,
                                    response: { output: { success: true } }
                                });
                            } else if (call.name === "clear_drawings") {
                                logDiagnostic("Model called clear_drawings", "TOOL");
                                if (window.AndroidInterface && window.AndroidInterface.onLiveCommandReceived) {
                                    window.AndroidInterface.onLiveCommandReceived("CLEAR_CUSTOM_LINES", "");
                                }
                                responses.push({
                                    id: call.id,
                                    response: { output: { success: true } }
                                });
                            } else if (call.name === "delete_trades") {
                                const target = call.args.target;
                                logDiagnostic(`Model called delete_trades targeting: ${target}`, "TOOL");
                                if (window.AndroidInterface && window.AndroidInterface.onLiveCommandReceived) {
                                    window.AndroidInterface.onLiveCommandReceived("DELETE", target);
                                }
                                responses.push({
                                    id: call.id,
                                    response: { output: { success: true } }
                                });
                            }
                        }

                        if (responses.length > 0 && liveWs && liveWs.readyState === WebSocket.OPEN) {
                            const responseFrame = {
                                toolResponse: {
                                    functionResponses: responses
                                }
                            };
                            liveWs.send(JSON.stringify(responseFrame));
                            logDiagnostic("Dispatched tool response back to the Gemini Live session.", "TOOL");
                        }
                        return;
                    }

                    if (payload.serverContent) {
                        const content = payload.serverContent;

                        // Interrupt Speaker immediately on user barge-in
                        if (content.interrupted) {
                            logDiagnostic("⚡ User barge-in detected. Clearing scheduled audio play queue...", "BARGE_IN");
                            clearPlaybackQueueLive();
                            window.AndroidInterface.onLiveTranscriptReceived("Bot", currentLiveBotText + " [Interrupted]");
                            currentLiveBotText = "";
                            window.isModelSpeaking = false;
                        }

                        if (content.modelTurn && content.modelTurn.parts) {
                            window.isModelSpeaking = true;
                            for (const part of content.modelTurn.parts) {
                                if (part.text) {
                                    currentLiveBotText += part.text;
                                    
                                    // Parse commands against the accumulated buffer to fix the streaming chunk token regex bug
                                    parseCommandTags(currentLiveBotText);
                                    
                                    window.AndroidInterface.onLiveTranscriptReceived("AI Analyst", part.text);
                                }
                                if (part.inlineData && part.inlineData.data) {
                                    // Queue chunk Base64 PCM data for real-time play
                                    scheduleAudioChunkPlay(part.inlineData.data);
                                }
                            }
                        }

                        if (content.turnComplete) {
                            logDiagnostic("Server turn complete.", "NETWORK");
                            currentLiveBotText = "";
                        }

                        if (content.inputTranscription && content.inputTranscription.text) {
                            // Forward recorded user speech transcript to bottom-sheet chat
                            window.AndroidInterface.onLiveTranscriptReceived("User", content.inputTranscription.text);
                        }
                    }
                } catch (e) {
                    window.isConnectingLiveSocket = false;
                    logDiagnostic("Error parsing WebSocket message: " + e.message, "ERROR");
                }
            };

            liveWs.onclose = (event) => {
                window.isConnectingLiveSocket = false;
                logDiagnostic("WebSocket connection closed. Code: " + event.code + " | Reason: " + (event.reason || "None"), "NETWORK");
                disconnectWebSocketLive();
            };

            liveWs.onerror = (err) => {
                window.isConnectingLiveSocket = false;
                logDiagnostic("WebSocket experienced an error.", "ERROR");
            };

        } catch (setupError) {
            window.isConnectingLiveSocket = false;
            logDiagnostic("WebSocket connection setup failed: " + setupError.message, "ERROR");
        }
    };

    /**
     * Gathers the active chart parameters from Java and sends a clientContent injection turn over WebSocket [2].
     */
    function injectInitialChartContext() {
        try {
            logDiagnostic("Compiling active chart metrics from Android framework...", "LIFECYCLE");
            // Default load fetches the last 10 candles context initially
            const chartContextString = window.AndroidInterface.getChartContext(10);
            
            // Format standard clientContent handshake block
            const contextPayload = {
                clientContent: {
                    turns: [{
                        role: "user",
                        parts: [{
                            text: "Here is the dynamic, real-time snapshot context of my active trading chart: \n" + chartContextString
                        }]
                    }],
                    turnComplete: true
                }
            };

            liveWs.send(JSON.stringify(contextPayload));
            logDiagnostic("Dynamic chart metrics injected into handshake successfully.", "NETWORK");
        } catch (err) {
            logDiagnostic("Failed to compile or inject initial chart context: " + err.message, "ERROR");
        }
    }

    /**
     * Fetches the mathematically detected local pattern candidate from Java
     * and streams it to Gemini for validation and verbal review (Phase 7).
     */
    window.validateLocalPattern = function() {
        if (!liveWs || liveWs.readyState !== WebSocket.OPEN) {
            return;
        }

        logDiagnostic("validateLocalPattern triggered. Querying native framework for candidates...", "LIFECYCLE");
        try {
            const candidateJsonStr = window.AndroidInterface.getLatestPatternCandidate();
            if (candidateJsonStr && candidateJsonStr !== "{}") {
                const contextPayload = {
                    clientContent: {
                        turns: [{
                            role: "user",
                            parts: [{
                                text: "Please validate this newly detected technical chart pattern candidate:\n" + candidateJsonStr
                            }]
                        }],
                        turnComplete: true
                    }
                };
                liveWs.send(JSON.stringify(contextPayload));
                logDiagnostic("Mathematical pattern candidate successfully streamed to Gemini Live Validator.", "NETWORK");
            } else {
                logDiagnostic("No active mathematical pattern candidate available to validate.", "DEBUG");
            }
        } catch (err) {
            logDiagnostic("Failed to fetch or validate local pattern: " + err.message, "ERROR");
        }
    };

    /**
     * Loop Closure handler: triggered after timeframe swaps to sync active metrics over-the-air [2].
     */
    window.updateLiveContextWithNewTimeframe = function() {
        if (liveWs && liveWs.readyState === WebSocket.OPEN) {
            logDiagnostic("Timeframe change completed. Re-injecting fresh chart context snapshot...", "LIFECYCLE");
            injectInitialChartContext();
        }
    };

    let silenceFramesLeft = 0;

    /**
     * Captures user voice at 16000Hz and streams raw PCM chunks in real-time.
     */
    async function initMicrophoneCapture() {
        logDiagnostic("Acquiring microphone hardware stream via getUserMedia...", "HARDWARE");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            liveMicStream = stream;

            liveAudioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const source = liveAudioContext.createMediaStreamSource(stream);
            liveAudioProcessor = liveAudioContext.createScriptProcessor(2048, 1, 1);

            silenceFramesLeft = 0;

            liveAudioProcessor.onaudioprocess = (e) => {
                if (!liveWs || liveWs.readyState !== WebSocket.OPEN) return;

                // 1. Mute/blank sending if the bot is currently playing audio (prevents self-interruption / fake barge-in)
                const now = livePlayCtx ? livePlayCtx.currentTime : 0;
                const isPlaying = (livePlayCtx && (activeSources.some(item => item.endTime > now) || nextPlayTime > now - 0.2));
                
                if (window.isModelSpeaking && !isPlaying) {
                    window.isModelSpeaking = false;
                }

                if (window.isModelSpeaking || isPlaying) {
                    return;
                }

                const inputFloat32 = e.inputBuffer.getChannelData(0);

                // 2. Compute RMS volume for the audio block
                let sum = 0;
                for (let i = 0; i < inputFloat32.length; i++) {
                    sum += inputFloat32[i] * inputFloat32[i];
                }
                const rms = Math.sqrt(sum / inputFloat32.length);

                // Noise Gate: Skip streaming silent frames to prevent bloating the server-side context window
                if (rms >= 0.012) {
                    silenceFramesLeft = 6; // Maintain a 6-frame hangover (~768ms) to avoid clipping words
                } else {
                    if (silenceFramesLeft > 0) {
                        silenceFramesLeft--;
                    } else {
                        // Suppress empty silence
                        return;
                    }
                }

                const pcmBuffer = new ArrayBuffer(inputFloat32.length * 2);
                const pcmView = new DataView(pcmBuffer);

                // Convert Float32 samples to Int16 PCM (Little-Endian)
                for (let i = 0; i < inputFloat32.length; i++) {
                    let sample = Math.max(-1, Math.min(1, inputFloat32[i]));
                    let int16Sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                    pcmView.setInt16(i * 2, int16Sample, true);
                }

                const base64AudioChunk = arrayBufferToBase64(pcmBuffer);

                // Stream PCM bytes to Gemini Live Server
                liveWs.send(JSON.stringify({
                    realtimeInput: {
                        audio: {
                            mimeType: "audio/pcm;rate=16000",
                            data: base64AudioChunk
                        }
                    }
                }));
            };

            source.connect(liveAudioProcessor);
            liveAudioProcessor.connect(liveAudioContext.destination);
            logDiagnostic("Microphone recording capture stream is active.", "HARDWARE");
        } catch (err) {
            logDiagnostic("Failed to acquire microphone: " + err.message, "ERROR");
            disconnectWebSocketLive();
        }
    }

    /**
     * Receives base64 PCM data (24000Hz) and schedules it smoothly on an AudioTrack style queue [1].
     */
    function scheduleAudioChunkPlay(base64Data) {
        try {
            if (!livePlayCtx) {
                livePlayCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            }

            const rawBuffer = base64ToArrayBuffer(base64Data);
            const int16Samples = new Int16Array(rawBuffer);
            const float32Samples = new Float32Array(int16Samples.length);

            // Scale 16-bit PCM back to Float32 for WebAudio playback
            for (let i = 0; i < int16Samples.length; i++) {
                float32Samples[i] = int16Samples[i] / 32768.0;
            }

            const audioBuffer = livePlayCtx.createBuffer(1, float32Samples.length, 24000);
            audioBuffer.copyToChannel(float32Samples, 0);

            const sourceNode = livePlayCtx.createBufferSource();
            sourceNode.buffer = audioBuffer;
            sourceNode.connect(livePlayCtx.destination);

            const currentTime = livePlayCtx.currentTime;
            if (nextPlayTime < currentTime) {
                nextPlayTime = currentTime + 0.05; // 50ms buffer safety gap
            }

            sourceNode.start(nextPlayTime);
            activeSources.push({
                source: sourceNode,
                endTime: nextPlayTime + audioBuffer.duration
            });

            nextPlayTime += audioBuffer.duration;
            activeSources = activeSources.filter(item => item.endTime > currentTime);
        } catch (err) {
            logDiagnostic("Audio queue scheduling failed: " + err.message, "ERROR");
        }
    }

    /**
     * Parses generated response text for programmatic tags and triggers native bridge commands [2].
     */
    function parseCommandTags(fullText) {
        // Parse Signal: E.g. SIGNAL: BUY | CONFIDENCE: 89 | TARGET: 64750
        const signalPattern = /SIGNAL:\s*(\w+)\s*\|\s*CONFIDENCE:\s*(\d+)\s*\|\s*TARGET:\s*([\d.]+)/i;
        const sigMatch = fullText.match(signalPattern);
        if (sigMatch) {
            const action = sigMatch[1];
            const confidence = sigMatch[2];
            const price = sigMatch[3];
            const payload = `${action}|${confidence}|${price}`;
            window.AndroidInterface.onLiveCommandReceived("SIGNAL", payload);
            
            // Clean matched token from accumulated buffer to avoid duplicate native operations
            currentLiveBotText = currentLiveBotText.replace(sigMatch[0], "[SIGNAL_PROCESSED]");
        }

        // Parse Indicator Custom Line: E.g. INDICATOR: Custom SMA 20 Support | LEVEL: 64120
        const indicatorPattern = /INDICATOR:\s*([^|\n]+)\|\s*LEVEL:\s*([\d.]+)/i;
        const indMatch = fullText.match(indicatorPattern);
        if (indMatch) {
            const label = indMatch[1].trim();
            const level = indMatch[2].trim();
            const payload = `${label}|${level}`;
            window.AndroidInterface.onLiveCommandReceived("INDICATOR", payload);
            
            // Clean matched token from buffer
            currentLiveBotText = currentLiveBotText.replace(indMatch[0], "[INDICATOR_PROCESSED]");
        }

        // Parse Timeframe Swaps: E.g. TIMEFRAME: 1m (from ins1.txt) [2]
        const timeframePattern = /TIMEFRAME:\s*(\w+)/i;
        const tfMatch = fullText.match(timeframePattern);
        if (tfMatch) {
            const timeframe = tfMatch[1].trim();
            window.AndroidInterface.onLiveCommandReceived("TIMEFRAME", timeframe);
            
            // Clean matched token from buffer
            currentLiveBotText = currentLiveBotText.replace(tfMatch[0], "[TIMEFRAME_PROCESSED]");
        }

        // Parse Canvas Resets: E.g. CLEAR_CUSTOM_LINES (from ins3.txt) [2]
        if (fullText.includes("CLEAR_CUSTOM_LINES")) {
            window.AndroidInterface.onLiveCommandReceived("CLEAR_CUSTOM_LINES", "");
            
            // Clean matched token from buffer
            currentLiveBotText = currentLiveBotText.replace("CLEAR_CUSTOM_LINES", "[CLEAR_PROCESSED]");
        }

        // Parse Deletion Command: E.g. DELETE: LAST or DELETE: ALL
        const deletePattern = /DELETE:\s*(\w+)/i;
        const delMatch = fullText.match(deletePattern);
        if (delMatch) {
            const deleteTarget = delMatch[1].trim().toUpperCase(); // e.g. LAST or ALL
            window.AndroidInterface.onLiveCommandReceived("DELETE", deleteTarget);
            
            // Clean matched token from buffer
            currentLiveBotText = currentLiveBotText.replace(delMatch[0], "[DELETE_PROCESSED]");
        }

        // Balanced Curly Brace Parser for PATTERN JSON Payloads
        const patternIndex = fullText.indexOf("PATTERN:");
        if (patternIndex !== -1) {
            const jsonStart = fullText.indexOf("{", patternIndex);
            if (jsonStart !== -1) {
                let braceCount = 0;
                let jsonEnd = -1;
                for (let i = jsonStart; i < fullText.length; i++) {
                    if (fullText[i] === "{") {
                        braceCount++;
                    } else if (fullText[i] === "}") {
                        braceCount--;
                        if (braceCount === 0) {
                            jsonEnd = i;
                            break;
                        }
                    }
                }
                if (jsonEnd !== -1) {
                    const jsonPayload = fullText.substring(jsonStart, jsonEnd + 1).trim();
                    try {
                        JSON.parse(jsonPayload);
                        window.AndroidInterface.onLiveCommandReceived("PATTERN", jsonPayload);
                        
                        // Clean the matched token from the conversation buffer to prevent duplicate triggers
                        const matchedSubstring = fullText.substring(patternIndex, jsonEnd + 1);
                        currentLiveBotText = currentLiveBotText.replace(matchedSubstring, "[PATTERN_PROCESSED]");
                    } catch (e) {
                        logDiagnostic("PATTERN parsed JSON is invalid: " + e.message, "DEBUG");
                    }
                }
            }
        }
    }

    function clearPlaybackQueueLive() {
        activeSources.forEach((item) => {
            try {
                item.source.stop();
            } catch (e) {}
        });
        activeSources = [];
        nextPlayTime = 0;
    }

    /**
     * Safely closes the WebSocket, releases the hardware mic stream, and disposes AudioContexts.
     */
    window.disconnectWebSocketLive = function() {
        isLiveSessionConnected = false;
        logDiagnostic("disconnectWebSocketLive sequence triggered. Disposing resources...", "LIFECYCLE");

        if (liveMicStream) {
            liveMicStream.getTracks().forEach(track => track.stop());
            liveMicStream = null;
        }
        if (liveAudioProcessor) {
            try { liveAudioProcessor.disconnect(); } catch(e) {}
            liveAudioProcessor = null;
        }
        if (liveAudioContext) {
            liveAudioContext.close().catch(() => {});
            liveAudioContext = null;
        }
        clearPlaybackQueueLive();
        if (livePlayCtx) {
            livePlayCtx.close().catch(() => {});
            livePlayCtx = null;
        }
        if (liveWs) {
            if (liveWs.readyState === WebSocket.OPEN || liveWs.readyState === WebSocket.CONNECTING) {
                try { liveWs.close(); } catch(e) {}
            }
            liveWs = null;
        }
        
        if (window.AndroidInterface) {
            window.AndroidInterface.onLiveWebSocketDisconnected("Disconnected from Live Session");
        }
    };

    window.onThemeChanged = function(isDark) {
        logDiagnostic("UI Theme state changed to: " + (isDark ? "DARK" : "LIGHT"), "LIFECYCLE");
    };
  </script>
</head>
<body>
  <h3>Live Agent WebRTC/WebSocket Context Running</h3>
</body>
